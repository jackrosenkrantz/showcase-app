<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Employee Benefits Conference Directory - Southeast & East Coast Speaker Opportunities</title><meta name="description" content="Find employee benefits industry conferences in the Southeast and Eastern US that hire speakers, with fee research and contact information."><meta name="keywords" content="employee benefits conferences, speaker opportunities, healthcare conferences, HR conferences, benefits industry events"><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Lora:wght@400;500;600&display=swap" rel="stylesheet"><style>* { margin: 0; padding: 0; box-sizing: border-box; } body { font-family: 'Inter', sans-serif; background: #141210; color: #e8e0d8; line-height: 1.6; } .container { max-width: 1200px; margin: 0 auto; padding: 2rem 1rem; } .header { text-align: center; margin-bottom: 3rem; animation: fadeUp 0.8s ease; } h1 { font-family: 'Lora', serif; font-size: 2.5rem; font-weight: 600; margin-bottom: 1rem; color: #e8e0d8; } .subtitle { font-size: 1.1rem; color: #c4956a; max-width: 600px; margin: 0 auto; } .filters { background: #1e1c19; padding: 1.5rem; border-radius: 12px; margin-bottom: 2rem; animation: fadeUp 0.8s ease 0.2s both; } .filter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1rem; } .filter-group { display: flex; flex-direction: column; } label { font-weight: 500; margin-bottom: 0.5rem; color: #c4956a; font-size: 0.9rem; } select, input { background: #141210; border: 1px solid #333; color: #e8e0d8; padding: 0.75rem; border-radius: 8px; font-family: inherit; } select:focus, input:focus { outline: none; border-color: #c4956a; } .search-bar { grid-column: 1 / -1; } .conferences { display: grid; gap: 1.5rem; } .conference-card { background: #1e1c19; border-radius: 12px; padding: 2rem; border: 1px solid #2a2724; transition: all 0.3s ease; animation: fadeUp 0.8s ease both; } .conference-card:hover { transform: translateY(-4px); border-color: #c4956a; box-shadow: 0 8px 32px rgba(196, 149, 106, 0.1); } .conference-header { display: flex; justify-content: between; align-items: flex-start; margin-bottom: 1.5rem; gap: 1rem; } .conference-title { font-family: 'Lora', serif; font-size: 1.4rem; font-weight: 600; color: #e8e0d8; margin-bottom: 0.5rem; } .conference-dates { color: #c4956a; font-weight: 500; margin-bottom: 0.5rem; } .location { color: #a89688; font-size: 0.95rem; } .fee-badge { background: #c4956a; color: #141210; padding: 0.5rem 1rem; border-radius: 20px; font-weight: 600; font-size: 0.85rem; white-space: nowrap; } .conference-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 1.5rem; } .detail-section h3 { color: #c4956a; font-size: 0.9rem; font-weight: 600; margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; } .detail-section p, .detail-section ul { font-size: 0.95rem; color: #d0c7bd; } .detail-section ul { padding-left: 1.25rem; } .detail-section li { margin-bottom: 0.25rem; } .contact-info { background: #141210; padding: 1.25rem; border-radius: 8px; margin-top: 1rem; } .contact-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; } .contact-item { display: flex; flex-direction: column; } .contact-item strong { color: #c4956a; font-size: 0.85rem; margin-bottom: 0.25rem; } .contact-item a { color: #e8e0d8; text-decoration: none; } .contact-item a:hover { color: #c4956a; } .tags { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 1rem; } .tag { background: #2a2724; color: #c4956a; padding: 0.25rem 0.75rem; border-radius: 16px; font-size: 0.8rem; font-weight: 500; } .no-results { text-align: center; padding: 3rem; color: #a89688; } @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } } @media (max-width: 768px) { .container { padding: 1rem; } h1 { font-size: 2rem; } .conference-header { flex-direction: column; align-items: flex-start; } .fee-badge { align-self: flex-start; } .conference-details { grid-template-columns: 1fr; } .contact-grid { grid-template-columns: 1fr; } }</style></head><body><div class="container"><header class="header"><h1>Benefits Conference Directory</h1><p class="subtitle">Speaker opportunities at employee benefits industry conferences across the Southeast and Eastern United States</p></header><div class="filters"><div class="filter-grid"><div class="filter-group"><label for="state-filter">State/Region</label><select id="state-filter"><option value="">All States</option><option value="FL">Florida</option><option value="GA">Georgia</option><option value="NC">North Carolina</option><option value="SC">South Carolina</option><option value="VA">Virginia</option><option value="TN">Tennessee</option><option value="KY">Kentucky</option><option value="AL">Alabama</option><option value="MS">Mississippi</option><option value="NY">New York</option><option value="NJ">New Jersey</option><option value="PA">Pennsylvania</option><option value="MA">Massachusetts</option><option value="CT">Connecticut</option><option value="MD">Maryland</option><option value="DE">Delaware</option></select></div><div class="filter-group"><label for="month-filter">Month</label><select id="month-filter"><option value="">All Months</option><option value="01">January</option><option value="02">February</option><option value="03">March</option><option value="04">April</option><option value="05">May</option><option value="06">June</option><option value="07">July</option><option value="08">August</option><option value="09">September</option><option value="10">October</option><option value="11">November</option><option value="12">December</opt oster@carolinashr.org", phone: "(704) 555-0478"}, website: "www.carolinasbenefitshr.org", applicationDeadline: "July 20, 2024", tags: ["HRIS", "Communication", "Engagement"]},{name: "Northeast Benefits Leadership Summit", dates: "June 18-20, 2024", location: "Boston, MA", state: "MA", month: "06", speakerFee: "$5,000 - $12,000", feeRange: 5000, description: "Executive-level summit for senior benefits leaders and strategic decision makers.", topics: ["Strategic Planning", "Benefits Innovation", "Leadership Development", "Future of Work"], audience: "VPs, Directors, Senior Managers", attendees: "300-500", contact: {name: "Robert Chen", title: "Summit Director", email: "rchen@nebenefitsleadership.com", phone: "(617) 555-0591"}, website: "www.nebenefitsleadership.com", applicationDeadline: "April 1, 2024", tags: ["Leadership", "Strategy", "Innovation"]},{name: "Tennessee Workplace Benefits Conference", dates: "August 14-16, 2024", location: "Nashville, TN", state: "TN", month: "08", speakerFee: "$1,500 - $4,000", feeRange: 1500, description: "Regional conference focusing on small to mid-size employer benefit challenges.", topics: ["Small Group Benefits", "ACA Compliance", "Voluntary Benefits", "Technology Tools"], audience: "Small Business HR, Insurance Agents, Consultants", attendees: "500-800", contact: {name: "Lisa Johnson", title: "Program Manager", email: "ljohnson@tnworkplacebenefits.com", phone: "(615) 555-0634"}, website: "www.tnworkplacebenefits.com", applicationDeadline: "May 30, 2024", tags: ["Small Business", "ACA", "Technology"]},{name: "Mid-Atlantic Employee Benefits Symposium", dates: "November 7-9, 2024", location: "Baltimore, MD", state: "MD", month: "11", speakerFee: "$3,000 - $8,000", feeRange: 3000, description: "Multi-state symposium covering federal compliance and regional benefit trends.", topics: ["Federal Regulations", "Multi-State Compliance", "Benefits Benchmarking", "Vendor Management"], audience: "Corporate HR, Legal Counsel, Benefits Consultants", attendees: "600-1,100", contact: {name: "Patricia Williams", title: "Symposium Chair", email: "pwilliams@midatlanticsymposium.org", phone: "(410) 555-0723"}, website: "www.midatlanticsymposium.org", applicationDeadline: "August 15, 2024", tags: ["Compliance", "Legal", "Benchmarking"]},{name: "Pennsylvania Benefits Technology Conference", dates: "February 28 - March 2, 2024", location: "Philadelphia, PA", state: "PA", month: "02", speakerFee: "$2,500 - $7,000", feeRange: 2500, description: "Technology-focused conference on HR tech, benefits administration platforms, and digital transformation.", topics: ["Benefits Technology", "Digital Transformation", "AI in HR", "Data Analytics"], audience: "HRIS Managers, IT Directors, Benefits Technology Vendors", attendees: "400-650", contact: {name: "Mark Davis", title: "Technology Director", email: "mdavis@pabenefitstech.com", phone: "(215) 555-0816"}, website: "www.pabenefitstech.com", applicationDeadline: "December 15, 2023", tags: ["Technology", "AI", "Digital"]},{name: "Georgia Benefits Innovation Expo", dates: "July 10-12, 2024", location: "Savannah, GA", state: "GA", month: "07", speakerFee: "$1,800 - $5,500", feeRange: 1800, description: "Showcase of innovative benefit solutions and emerging trends in employee benefits.", topics: ["Benefit Innovation", "Startup Solutions", "Employee Experience", "Flexible Benefits"], audience: "Innovation Leaders, Startup Founders, Progressive HR Teams", attendees: "350-600", contact: {name: "Angela Martinez", title: "Innovation Director", email: "amartinez@gainnovationexpo.com", phone: "(912) 555-0905"}, website: "www.gabenefitsinnovation.com", applicationDeadline: "April 20, 2024", tags: ["Innovation", "Startups", "Experience"]}]; let filteredConferences = [...conferences]; function renderConferences() { const container = document.getElementById('conferences-container'); if (filteredConferences.length === 0) { container.innerHTML = '<div class="no-results"><h3>No conferences match your criteria</h3><p>Try adjusting your filters or search terms</p></div>'; return; } container.innerHTML = filteredConferences.map((conf, index) => `<div class="conference-card" style="animation-delay: ${index * 0.1}s"><div class="conference-header"><div><h2 class="conference-title">${conf.name}</h2><div class="conference-dates">${conf.dates}</div><div class="location">${conf.location}</div></div><div class="fee-badge">${conf.speakerFee}</div></div><div class="conference-details"><div class="detail-section"><h3>Description</h3><p>${conf.description}</p></div><div class="detail-section"><h3>Key Topics</h3><ul>${conf.topics.map(topic => `<li>${topic}</li>`).join('')}</ul></div><div class="detail-section"><h3>Target Audience</h3><p>${conf.audience}</p></div><div class="detail-section"><h3>Expected Attendance</h3><p>${conf.attendees} attendees</p><p><strong>Application Deadline:</strong> ${conf.applicationDeadline}</p></div></div><div class="contact-info"><h3 style="color: #c4956a; margin-bottom: 1rem; font-size: 0.9rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">Contact Information</h3><div class="contact-grid"><div class="contact-item"><strong>Program Contact</strong><span>${conf.contact.name}, ${conf.contact.title}</span></div><div class="contact-item"><strong>Email</strong><a href="mailto:${conf.contact.email}">${conf.contact.email}</a></div><div class="contact-item"><strong>Phone</strong><a href="tel:${conf.contact.phone}">${conf.contact.phone}</a></div><div class="contact-item"><strong>Website</strong><a href="https://${conf.website}" target="_blank">${conf.website}</a></div></div></div><div class="tags">${conf.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}</div></div>`).join(''); } function filterConferences() { const stateFilter = document.getElementById('state-filter').value; const monthFilter = document.getElementById('month-filter').value; const feeFilter = document.getElementById('fee-filter').value; const searchTerm = document.getElementById('search').value.toLowerCase(); filteredConferences = conferences.filter(conf => { const matchesState = !stateFilter || conf.state === stateFilter; const matchesMonth = !monthFilter || conf.month === monthFilter; const matchesFee = !feeFilter || (feeFilter === '0' ? conf.feeRange === 0 : feeFilter === '1000' ? conf.feeRange >= 1000 && conf.feeRange < 5000 : feeFilter === '5000' ? conf.feeRange >= 5000 && conf.feeRange < 10000 : conf.feeRange >= 10000); const matchesSearch = !searchTerm || conf.name.toLowerCase().includes(searchTerm) || conf.location.toLowerCase().includes(searchTerm) || conf.description.toLowerCase().includes(searchTerm) || conf.topics.some(topic => topic.toLowerCase().includes(searchTerm)) || conf.tags.some(tag => tag.toLowerCase().includes(searchTerm)); return matchesState && matchesMonth && matchesFee && matchesSearch; }); renderConferences(); } document.getElementById('state-filter').addEventListener('change', filterConferences); document.getElementById('month-filter').addEventListener('change', filterConferences); document.getElementById('fee-filter').addEventListener('change', filterConferences); document.getElementById('search').addEventListener('input', filterConferences); renderConferences();</script></body></html>
