<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Showcase</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #141210;
    --surface: #1e1c19;
    --surface-hover: #272420;
    --border: #2e2a26;
    --border-hover: #4a4238;
    --muted: #6b6058;
    --text-secondary: #9a918a;
    --text-primary: #e8e0d8;
    --text-bright: #f5f0eb;
    --amber: #c4956a;
    --amber-dim: rgba(196, 149, 106, 0.06);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    padding: 3rem 1.5rem 4rem;
  }

  .container {
    max-width: 800px;
    margin: 0 auto;
  }

  .header {
    text-align: center;
    margin-bottom: 3rem;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  .header h1 {
    font-family: 'Lora', serif;
    font-weight: 400;
    font-size: 2rem;
    color: var(--text-bright);
    letter-spacing: 0.01em;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 16px;
  }

  .folder-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 26px 24px;
    text-decoration: none;
    color: inherit;
    transition: background 0.25s ease, border-color 0.25s ease, transform 0.2s ease, box-shadow 0.25s ease;
    display: flex;
    flex-direction: column;
    justify-content: center;
    height: 140px;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.6s ease forwards;
  }

  .grid .folder-card:nth-child(1) { animation-delay: 0.15s; }
  .grid .folder-card:nth-child(2) { animation-delay: 0.25s; }
  .grid .folder-card:nth-child(3) { animation-delay: 0.35s; }

  .folder-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--amber-dim);
    opacity: 0;
    transition: opacity 0.3s ease;
    border-radius: 14px;
  }

  .folder-card:hover::before { opacity: 1; }

  .folder-card:hover {
    background: var(--surface-hover);
    border-color: var(--border-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
  }

  .folder-card .folder-icon {
    font-size: 1.4rem;
    margin-bottom: 0.6rem;
    position: relative;
    z-index: 1;
  }

  .folder-card .title {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    font-weight: 400;
    color: var(--text-bright);
    margin-bottom: 0.3rem;
    position: relative;
    z-index: 1;
  }

  .folder-card .meta {
    font-size: 0.68rem;
    font-weight: 300;
    color: var(--muted);
    letter-spacing: 0.03em;
    position: relative;
    z-index: 1;
  }

  .folder-card .arrow {
    position: absolute;
    top: 24px;
    right: 22px;
    font-size: 0.85rem;
    color: var(--muted);
    transition: color 0.2s ease, transform 0.2s ease;
    z-index: 1;
  }

  .folder-card:hover .arrow {
    color: var(--amber);
    transform: translateX(3px);
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .nav-link {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text-secondary);
    text-decoration: none;
    padding: 0.5rem 1rem;
    border-radius: 100px;
    background: var(--surface);
    border: 1px solid var(--border);
    transition: color 0.2s ease, border-color 0.2s ease;
    z-index: 10;
    opacity: 0;
    animation: fadeUp 0.6s ease 0.5s both;
  }

  .nav-link:hover {
    color: var(--amber);
    border-color: var(--border-hover);
  }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; gap: 12px; }
    body { padding: 2rem 1rem 3rem; }
    .folder-card { height: 130px; padding: 22px 20px; }
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>The Showcase</h1>
  </div>

  <div class="grid">
    <a href="archetypes.html" class="folder-card">
      <span class="arrow">&rarr;</span>
      <div class="folder-icon">&#9813;</div>
      <div class="title">Archetypes</div>
      <div class="meta">4 apps</div>
    </a>

    <a href="client-work.html" class="folder-card">
      <span class="arrow">&rarr;</span>
      <div class="folder-icon">&#9883;</div>
      <div class="title">Client Work</div>
      <div class="meta">6 pages</div>
    </a>

    <a href="tools.html" class="folder-card">
      <span class="arrow">&rarr;</span>
      <div class="folder-icon">&#9881;</div>
      <div class="title">Tools</div>
      <div class="meta">3 pages</div>
    </a>
  </div>
</div>

<a href="https://anchor-1-production.up.railway.app" class="nav-link">The Anchor</a>

</body>
</html>
