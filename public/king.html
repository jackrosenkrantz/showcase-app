<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Knight App</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0f0f0f;
    --bg-card: #1a1816;
    --bg-card-hover: #242018;
    --primary: #c9a96e;
    --primary-soft: #e8dcc8;
    --primary-deep: #8a7340;
    --gold: #c9a96e;
    --gold-soft: rgba(201, 169, 110, 0.15);
    --gold-glow: rgba(201, 169, 110, 0.3);
    --gold-glow-strong: rgba(201, 169, 110, 0.6);
    --text: #e8e0d8;
    --text-soft: #9a918a;
    --text-muted: #5a5248;
    --iron: #3d3832;
    --iron-light: #5a5248;
    --blood: #8b2020;
    --blood-deep: #5a1515;
    --skin: #d4b896;
    --skin-shadow: #b89a78;
    --hair: #2a1a0a;
    --tunic: #1a1816;
    --chain: rgba(201, 169, 110, 0.03);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem 4rem;
    position: relative;
    overflow-x: hidden;
  }

  /* Chain mail texture */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(circle 4px at 10px 10px, var(--chain) 50%, transparent 50%),
      radial-gradient(circle 4px at 30px 30px, var(--chain) 50%, transparent 50%),
      radial-gradient(circle 3px at 20px 5px, var(--chain) 50%, transparent 50%);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  @keyframes sparkle {
    0%, 100% { opacity: 0; transform: scale(0.5) rotate(0deg); }
    50% { opacity: 1; transform: scale(1.2) rotate(180deg); }
  }

  @keyframes pulse-gold {
    0%, 100% { box-shadow: 0 0 8px var(--gold-soft); }
    50% { box-shadow: 0 0 20px rgba(201, 169, 110, 0.4); }
  }

  @keyframes float-sword {
    0% { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) rotate(-20deg) scale(0.5); }
  }

  @keyframes glow-border {
    0%, 100% { border-color: var(--primary); box-shadow: 0 0 8px var(--gold-glow); }
    50% { border-color: var(--primary-soft); box-shadow: 0 0 16px var(--gold-glow-strong); }
  }

  @keyframes aura-pulse {
    0%, 100% { box-shadow: 0 0 20px transparent; }
    50% { box-shadow: 0 0 40px var(--gold-glow); }
  }

  @keyframes aura-pulse-gold {
    0%, 100% { box-shadow: 0 0 30px var(--gold-soft); }
    50% { box-shadow: 0 0 60px rgba(201, 169, 110, 0.35); }
  }

  /* ========== HEADER ========== */
  .header {
    text-align: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease 0.1s both;
  }

  .header h1 {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 2.2rem;
    color: var(--primary);
    letter-spacing: -0.01em;
    margin-bottom: 0.5rem;
  }

  .header .subtitle {
    font-family: 'Lora', serif;
    font-size: 1rem;
    font-style: italic;
    color: var(--text-soft);
    margin-bottom: 0.4rem;
  }

  .header .tagline {
    font-size: 0.7rem;
    font-weight: 300;
    color: var(--text-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  /* ========== STREAK ========== */
  .streak-badge {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    margin-top: 0.75rem;
    padding: 0.35rem 0.85rem;
    background: var(--gold-soft);
    border: 1px solid rgba(201, 169, 110, 0.2);
    border-radius: 100px;
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gold);
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .streak-badge.show { opacity: 1; }
  .streak-badge .flame { font-size: 0.8rem; }

  /* ========== AVATAR ========== */
  .avatar-section {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 2.5rem;
    animation: fadeUp 0.8s ease 0.25s both;
  }

  .avatar-title {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 1rem;
    position: relative;
    z-index: 11;
    transition: color 0.4s ease;
  }

  .avatar-title.elevated { color: var(--primary); }
  .avatar-title.crowned { color: var(--gold); }

  .avatar-wrap {
    position: relative;
    width: 180px;
    height: 280px;
    margin-bottom: 0.5rem;
    border-radius: 50%;
    transition: box-shadow 0.6s ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .avatar-wrap.aura-1 { animation: aura-pulse 3s ease-in-out infinite; }
  .avatar-wrap.aura-2 { animation: aura-pulse 2.5s ease-in-out infinite; }
  .avatar-wrap.aura-3 { animation: aura-pulse 2s ease-in-out infinite; }
  .avatar-wrap.aura-4 { animation: aura-pulse-gold 2s ease-in-out infinite; }

  .avatar-figure {
    position: relative;
    width: 160px;
    height: 260px;
  }

  /* Throne */
  .throne-back {
    position: absolute;
    top: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 200px;
    background: #1a1210;
    border-radius: 8px 8px 0 0;
    z-index: 0;
    border: 1px solid #2a2018;
  }

  .throne-back::before {
    content: '';
    position: absolute;
    top: 8px;
    left: 8px;
    right: 8px;
    height: 2px;
    background: var(--primary-deep);
    opacity: 0.4;
  }

  .throne-back::after {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 14px;
    background: var(--primary-deep);
    border-radius: 50%;
    opacity: 0.3;
    margin-top: -7px;
  }

  .throne-arm-left, .throne-arm-right {
    position: absolute;
    top: 130px;
    width: 18px;
    height: 60px;
    background: #1a1210;
    border: 1px solid #2a2018;
    z-index: 1;
  }

  .throne-arm-left {
    left: 8px;
    border-radius: 4px 0 0 4px;
  }

  .throne-arm-right {
    right: 8px;
    border-radius: 0 4px 4px 0;
  }

  .throne-arm-left::after, .throne-arm-right::after {
    content: '';
    position: absolute;
    top: 4px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: var(--primary-deep);
    border-radius: 50%;
    opacity: 0.3;
  }

  /* Head */
  .avatar-head {
    position: absolute;
    top: 40px;
    left: 50%;
    transform: translateX(-50%);
    width: 44px;
    height: 48px;
    background: var(--skin);
    border-radius: 50% 50% 45% 45%;
    z-index: 4;
  }

  /* Hair */
  .avatar-hair {
    position: absolute;
    top: 36px;
    left: 50%;
    transform: translateX(-50%);
    width: 48px;
    height: 26px;
    background: var(--hair);
    border-radius: 50% 50% 30% 30%;
    z-index: 5;
  }

  /* Crown (hidden by default) */
  .avatar-crown {
    position: absolute;
    top: 22px;
    left: 50%;
    transform: translateX(-50%) scale(0);
    z-index: 6;
    transition: transform 0.4s ease;
    width: 50px;
    height: 22px;
  }

  .avatar-crown.show { transform: translateX(-50%) scale(1); }

  .crown-base {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 10px;
    background: var(--gold);
    border-radius: 2px;
  }

  .crown-point {
    position: absolute;
    bottom: 10px;
    width: 8px;
    height: 12px;
    background: var(--gold);
    clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
  }

  .crown-point:nth-child(2) { left: 4px; }
  .crown-point:nth-child(3) { left: 50%; transform: translateX(-50%); height: 15px; }
  .crown-point:nth-child(4) { right: 4px; }

  .crown-jewel {
    position: absolute;
    bottom: 2px;
    left: 50%;
    transform: translateX(-50%);
    width: 6px;
    height: 6px;
    background: var(--blood);
    border-radius: 50%;
  }

  /* Neck */
  .avatar-neck {
    position: absolute;
    top: 84px;
    left: 50%;
    transform: translateX(-50%);
    width: 18px;
    height: 14px;
    background: var(--skin);
    z-index: 3;
  }

  /* Torso / Tunic */
  .avatar-torso {
    position: absolute;
    top: 96px;
    left: 50%;
    transform: translateX(-50%);
    width: 70px;
    height: 70px;
    background: var(--tunic);
    border-radius: 6px 6px 2px 2px;
    z-index: 3;
    transition: all 0.4s ease;
    border: 1px solid #2a2420;
  }

  /* Tunic V-neck detail */
  .avatar-torso::before {
    content: '';
    position: absolute;
    top: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 16px solid var(--skin);
  }

  /* Armor chestplate (hidden by default) */
  .avatar-armor {
    position: absolute;
    top: 96px;
    left: 50%;
    transform: translateX(-50%);
    width: 72px;
    height: 72px;
    background: var(--iron);
    border-radius: 6px 6px 2px 2px;
    z-index: 4;
    opacity: 0;
    transition: opacity 0.5s ease;
    border: 1px solid #4a4238;
  }

  .avatar-armor.show { opacity: 1; }

  /* Armor diamond emblem */
  .avatar-armor::after {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(45deg);
    width: 18px;
    height: 18px;
    background: var(--gold);
    opacity: 0.8;
  }

  /* Pauldrons */
  .avatar-pauldron-left, .avatar-pauldron-right {
    position: absolute;
    top: 92px;
    width: 22px;
    height: 18px;
    background: var(--gold);
    border-radius: 50% 50% 20% 20%;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.5s ease 0.1s;
  }

  .avatar-pauldron-left { left: 22px; }
  .avatar-pauldron-right { right: 22px; }
  .avatar-pauldron-left.show, .avatar-pauldron-right.show { opacity: 1; }

  /* Arms */
  .avatar-arm-left, .avatar-arm-right {
    position: absolute;
    top: 100px;
    width: 16px;
    height: 50px;
    background: var(--skin);
    border-radius: 8px;
    z-index: 2;
  }

  .avatar-arm-left { left: 26px; transform: rotate(6deg); }
  .avatar-arm-right { right: 26px; transform: rotate(-6deg); }

  /* Cape (hidden by default) */
  .avatar-cape {
    position: absolute;
    top: 90px;
    left: 50%;
    transform: translateX(-50%);
    width: 90px;
    height: 120px;
    background: linear-gradient(180deg, var(--blood) 0%, var(--blood-deep) 100%);
    border-radius: 0 0 40px 40px;
    z-index: 1;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .avatar-cape.show { opacity: 1; }

  .avatar-cape::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10px;
    right: 10px;
    height: 3px;
    background: var(--primary-deep);
    border-radius: 2px;
    opacity: 0.4;
  }

  /* Legs */
  .avatar-legs {
    position: absolute;
    top: 164px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 3;
  }

  .avatar-leg-left, .avatar-leg-right {
    position: absolute;
    width: 18px;
    height: 55px;
    background: #1a1816;
    border-radius: 4px;
    border: 1px solid #2a2420;
  }

  .avatar-leg-left { left: -22px; }
  .avatar-leg-right { left: 4px; }

  /* Boots */
  .avatar-boot-left, .avatar-boot-right {
    position: absolute;
    top: 50px;
    width: 22px;
    height: 12px;
    background: #1a1210;
    border-radius: 2px 6px 6px 2px;
  }

  .avatar-boot-left { left: -24px; }
  .avatar-boot-right { left: 2px; border-radius: 6px 2px 2px 6px; }

  /* Sword (hidden by default) */
  .avatar-sword {
    position: absolute;
    top: 100px;
    right: 12px;
    z-index: 6;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  .avatar-sword.show { opacity: 1; }

  .sword-blade {
    width: 4px;
    height: 60px;
    background: linear-gradient(180deg, #d0d0d0 0%, #a0a0a0 100%);
    margin: 0 auto;
    border-radius: 2px 2px 0 0;
  }

  .sword-guard {
    width: 20px;
    height: 4px;
    background: var(--gold);
    border-radius: 2px;
    margin-left: -8px;
  }

  .sword-handle {
    width: 6px;
    height: 14px;
    background: #2a1a0a;
    margin: 0 auto;
    margin-left: -1px;
    border-radius: 0 0 2px 2px;
  }

  .sword-pommel {
    width: 8px;
    height: 8px;
    background: var(--gold);
    border-radius: 50%;
    margin-left: -2px;
  }

  /* Sparkles */
  .avatar-sparkles {
    position: absolute;
    inset: -20px;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.4s ease;
  }

  .avatar-sparkles.show { opacity: 1; }

  .avatar-sparkles span {
    position: absolute;
    font-size: 0.9rem;
    animation: sparkle 1.5s ease-in-out infinite;
  }

  .avatar-sparkles span:nth-child(1) { top: 8%; left: 5%; animation-delay: 0s; }
  .avatar-sparkles span:nth-child(2) { top: 5%; right: 8%; animation-delay: 0.3s; }
  .avatar-sparkles span:nth-child(3) { top: 40%; left: 0; animation-delay: 0.6s; }
  .avatar-sparkles span:nth-child(4) { top: 35%; right: 0; animation-delay: 0.9s; }
  .avatar-sparkles span:nth-child(5) { bottom: 25%; left: 8%; animation-delay: 0.4s; }
  .avatar-sparkles span:nth-child(6) { bottom: 20%; right: 5%; animation-delay: 0.7s; }

  /* Reward text */
  .avatar-reward-text {
    font-family: 'Lora', serif;
    font-size: 1.1rem;
    font-style: italic;
    color: var(--gold);
    opacity: 0;
    transform: translateY(8px);
    transition: all 0.5s ease;
    text-align: center;
    min-height: 1.5em;
  }

  .avatar-reward-text.show { opacity: 1; transform: translateY(0); }
  .avatar-reward-text.tier { color: var(--text-soft); font-size: 0.95rem; }

  /* ========== DUTIES ========== */
  .duties-section {
    margin-bottom: 2rem;
    animation: fadeUp 0.8s ease 0.4s both;
  }

  .duties-header {
    font-family: 'Lora', serif;
    font-size: 1.15rem;
    font-weight: 400;
    color: var(--primary-soft);
    margin-bottom: 1rem;
    text-align: center;
  }

  .duties-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
  }

  @media (max-width: 480px) {
    .duties-grid { grid-template-columns: 1fr; }
  }

  .duty-card {
    background: var(--bg-card);
    border: 1.5px solid var(--text-muted);
    border-radius: 14px;
    padding: 1.25rem;
    cursor: pointer;
    transition: all 0.35s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .duty-card:hover {
    background: var(--bg-card-hover);
    border-color: var(--text-soft);
  }

  .duty-card.checked {
    border-color: var(--primary);
    animation: glow-border 2s ease-in-out infinite;
  }

  .duty-card-top {
    display: flex;
    align-items: flex-start;
    gap: 0.65rem;
    margin-bottom: 0.5rem;
  }

  .duty-checkbox {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: 2px solid var(--text-muted);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.3s ease;
    margin-top: 1px;
  }

  .duty-checkbox .check-icon {
    opacity: 0;
    color: var(--bg);
    font-size: 0.7rem;
    font-weight: 700;
    transition: opacity 0.2s ease;
  }

  .duty-card.checked .duty-checkbox {
    background: var(--primary);
    border-color: var(--primary);
    box-shadow: 0 0 8px var(--gold-glow);
  }

  .duty-card.checked .duty-checkbox .check-icon { opacity: 1; }

  .duty-name {
    font-family: 'Lora', serif;
    font-size: 0.9rem;
    font-weight: 400;
    color: var(--primary-soft);
    transition: all 0.3s ease;
    line-height: 1.4;
  }

  .duty-card.checked .duty-name {
    text-decoration: line-through;
    text-decoration-color: var(--primary);
    color: var(--text-soft);
  }

  .duty-desc {
    font-size: 0.72rem;
    font-weight: 300;
    color: var(--text-muted);
    line-height: 1.5;
    margin-left: 2.15rem;
    transition: color 0.3s ease;
  }

  .duty-card.checked .duty-desc { color: var(--text-soft); }

  .duty-affirm {
    margin-left: 2.15rem;
    margin-top: 0.5rem;
    font-family: 'Lora', serif;
    font-size: 0.78rem;
    font-style: italic;
    color: var(--primary);
    opacity: 0;
    transform: translateY(4px);
    transition: all 0.4s ease;
  }

  .duty-card.checked .duty-affirm { opacity: 1; transform: translateY(0); }

  .sword-float {
    position: absolute;
    font-size: 0.85rem;
    pointer-events: none;
    animation: float-sword 1s ease-out forwards;
  }

  /* ========== PROGRESS ========== */
  .progress-section {
    margin-bottom: 2rem;
    animation: fadeUp 0.8s ease 0.55s both;
  }

  .progress-label {
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
    text-align: center;
  }

  .progress-bar-wrap {
    width: 100%;
    height: 10px;
    background: rgba(201, 169, 110, 0.08);
    border-radius: 100px;
    overflow: hidden;
  }

  .progress-bar-fill {
    height: 100%;
    border-radius: 100px;
    background: linear-gradient(90deg, var(--iron) 0%, var(--primary) 100%);
    transition: width 0.5s ease;
    width: 0%;
  }

  .progress-bar-fill.full {
    animation: pulse-gold 1.5s ease-in-out infinite;
    background: linear-gradient(90deg, var(--gold) 0%, #e8dcc8 100%);
  }

  .progress-text {
    text-align: center;
    margin-top: 0.5rem;
    font-size: 0.75rem;
    font-weight: 300;
    color: var(--text-soft);
    transition: all 0.3s ease;
  }

  .progress-text.complete {
    color: var(--gold);
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 0.85rem;
  }

  /* ========== JOURNAL ========== */
  .journal-section { margin-bottom: 2.5rem; animation: fadeUp 0.5s ease both; text-align: center; }
  .journal-section.hidden { display: none; }

  .journal-prompt {
    font-family: 'Lora', serif;
    font-size: 0.95rem;
    font-style: italic;
    color: var(--primary);
    margin-bottom: 0.75rem;
  }

  .journal-input {
    font-family: 'Inter', sans-serif;
    font-size: 0.85rem;
    font-weight: 300;
    color: var(--primary-soft);
    background: var(--bg-card);
    border: 1px solid var(--text-muted);
    border-radius: 12px;
    padding: 0.85rem 1rem;
    width: 100%;
    resize: none;
    outline: none;
    min-height: 3.5em;
    transition: border-color 0.3s ease;
  }

  .journal-input::placeholder { color: var(--text-muted); font-style: italic; }
  .journal-input:focus { border-color: var(--primary); }

  .journal-save-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 0.6rem;
    padding: 0.5rem 1.2rem;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--text-muted);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .journal-save-btn:hover { color: var(--gold); border-color: var(--gold); }
  .journal-save-btn.saved { color: var(--gold); border-color: var(--gold); cursor: default; }

  /* ========== RESET ========== */
  .reset-section { text-align: center; animation: fadeUp 0.8s ease 0.7s both; }

  .reset-btn {
    font-family: 'Inter', sans-serif;
    font-size: 0.65rem;
    font-weight: 400;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 0.6rem 1.5rem;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--text-muted);
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.25s ease;
  }

  .reset-btn:hover { color: var(--primary); border-color: var(--primary); }

  /* ========== MODAL ========== */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(15, 15, 15, 0.9); backdrop-filter: blur(6px);
    z-index: 100; align-items: center; justify-content: center; padding: 2rem;
  }

  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--bg-card); border: 1px solid var(--text-muted);
    border-radius: 18px; padding: 2.5rem; max-width: 360px; width: 100%; text-align: center;
  }

  .modal p {
    font-family: 'Lora', serif; font-size: 1rem; font-style: italic;
    color: var(--primary-soft); margin-bottom: 1.5rem; line-height: 1.6;
  }

  .modal-btns { display: flex; gap: 0.75rem; justify-content: center; }

  .modal-btn {
    font-family: 'Inter', sans-serif; font-size: 0.65rem; font-weight: 500;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 0.6rem 1.3rem;
    border-radius: 100px; cursor: pointer; transition: all 0.25s ease;
  }

  .modal-btn.confirm { background: var(--primary); color: var(--bg); border: none; }
  .modal-btn.confirm:hover { background: var(--primary-soft); }
  .modal-btn.cancel { background: transparent; color: var(--text-muted); border: 1px solid var(--text-muted); }
  .modal-btn.cancel:hover { color: var(--text-soft); border-color: var(--text-soft); }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <h1>The Knight App</h1>
    <div class="subtitle">Discipline is the sword. Ritual is the armor.</div>
    <div class="tagline">Complete your duties. Earn your throne.</div>
    <div class="streak-badge" id="streakBadge">
      <span class="flame">🔥</span>
      <span id="streakText">Day 1 streak</span>
    </div>
  </div>

  <div class="avatar-section">
    <div class="avatar-title" id="avatarTitle">Squire</div>
    <div class="avatar-wrap" id="avatarWrap">
      <div class="avatar-figure">
        <!-- Throne -->
        <div class="throne-back"></div>
        <div class="throne-arm-left"></div>
        <div class="throne-arm-right"></div>
        <!-- Cape -->
        <div class="avatar-cape" id="avatarCape"></div>
        <!-- Hair & Crown -->
        <div class="avatar-hair"></div>
        <div class="avatar-crown" id="avatarCrown">
          <div class="crown-base"></div>
          <div class="crown-point"></div>
          <div class="crown-point"></div>
          <div class="crown-point"></div>
          <div class="crown-jewel"></div>
        </div>
        <!-- Head & Neck -->
        <div class="avatar-head"></div>
        <div class="avatar-neck"></div>
        <!-- Arms -->
        <div class="avatar-arm-left"></div>
        <div class="avatar-arm-right"></div>
        <!-- Torso -->
        <div class="avatar-torso"></div>
        <div class="avatar-armor" id="avatarArmor"></div>
        <div class="avatar-pauldron-left" id="avatarPauldronL"></div>
        <div class="avatar-pauldron-right" id="avatarPauldronR"></div>
        <!-- Sword -->
        <div class="avatar-sword" id="avatarSword">
          <div class="sword-blade"></div>
          <div class="sword-guard"></div>
          <div class="sword-handle"></div>
          <div class="sword-pommel"></div>
        </div>
        <!-- Legs -->
        <div class="avatar-legs">
          <div class="avatar-leg-left"></div>
          <div class="avatar-leg-right"></div>
          <div class="avatar-boot-left"></div>
          <div class="avatar-boot-right"></div>
        </div>
        <!-- Sparkles -->
        <div class="avatar-sparkles" id="avatarSparkles">
          <span>✨</span><span>✨</span><span>✨</span>
          <span>✨</span><span>✨</span><span>✨</span>
        </div>
      </div>
    </div>
    <div class="avatar-reward-text" id="avatarRewardText"></div>
  </div>

  <div class="duties-section">
    <div class="duties-header">⚔️ Today's Duties</div>
    <div class="duties-grid" id="dutiesGrid"></div>
  </div>

  <div class="progress-section">
    <div class="progress-label">Today's discipline:</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="progressFill"></div>
    </div>
    <div class="progress-text" id="progressText">0 of 4 duties complete</div>
  </div>

  <div class="journal-section hidden" id="journalSection">
    <div class="journal-prompt" id="journalPrompt">What did discipline feel like today, king?</div>
    <textarea class="journal-input" id="journalInput" placeholder="Write here... the throne remembers." rows="3"></textarea>
    <br>
    <button class="journal-save-btn" id="journalSaveBtn" onclick="saveJournal()">Seal it in iron</button>
  </div>

  <div class="reset-section">
    <button class="reset-btn" onclick="showResetModal()">Begin a New Campaign</button>
  </div>

</div>

<div class="modal-overlay" id="resetModal">
  <div class="modal">
    <p>Ready to ride again, soldier?</p>
    <div class="modal-btns">
      <button class="modal-btn confirm" onclick="confirmReset()">Mount up</button>
      <button class="modal-btn cancel" onclick="closeResetModal()">Not yet</button>
    </div>
  </div>
</div>

<script>
  const DUTIES = [
    { key: 'temple', name: 'Iron Temple', desc: 'You trained your body. The temple is strong.' },
    { key: 'warroom', name: 'The War Room', desc: 'Strategy, planning, execution. You moved the pieces.' },
    { key: 'forge', name: 'The Forge', desc: 'You built something today. Code, content, craft.' },
    { key: 'council', name: 'The Council', desc: 'You connected with your people. No king rules alone.' }
  ];

  const PRAISE_POOL = [
    'Duty honored.', 'The king approves.', 'Discipline noted.', 'Well done, soldier.',
    'Strength recognized.', 'That\'s how it\'s done.', 'Iron will.', 'The throne remembers.',
    'Sovereign move.', 'Respect.'
  ];

  const TIER_MESSAGES = [
    '',
    'The day begins with discipline.',
    'Halfway. Hold the line.',
    'Almost sovereign. One more.',
    ''
  ];

  const FULL_PRAISE = [
    'Fully armed. The throne is yours.',
    'Every duty honored. You are the standard.',
    'Complete dominion. Long live the king.',
    'Iron discipline. Gold reward.',
    'Nothing undone. You were built for this.'
  ];

  const JOURNAL_PROMPTS = [
    'What did discipline feel like today, king?',
    'Where did you show up strongest?',
    'What does the man in the mirror need to hear?',
    'What are you building that will outlast you?',
    'How does it feel to hold the throne?'
  ];

  const TITLES = [
    { min: 0, label: 'Squire', css: '' },
    { min: 3, label: 'Knight', css: 'elevated' },
    { min: 7, label: 'Champion', css: 'elevated' },
    { min: 14, label: 'Commander', css: 'elevated' },
    { min: 21, label: 'Warlord', css: 'crowned' },
    { min: 30, label: 'King', css: 'crowned' }
  ];

  function getTitle(streak) {
    let title = TITLES[0];
    for (const t of TITLES) { if (streak >= t.min) title = t; }
    return title;
  }

  function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
  function dayKey() { return new Date().toISOString().slice(0, 10); }

  function loadState() {
    try {
      const raw = localStorage.getItem('knight-duties');
      if (!raw) return {};
      const data = JSON.parse(raw);
      if (data.date !== dayKey()) return {};
      return data.checked || {};
    } catch { return {}; }
  }

  function saveState(checked) {
    localStorage.setItem('knight-duties', JSON.stringify({ date: dayKey(), checked }));
  }

  function loadStreak() {
    try {
      const raw = localStorage.getItem('knight-streak');
      if (!raw) return { count: 0, lastDate: null };
      return JSON.parse(raw);
    } catch { return { count: 0, lastDate: null }; }
  }

  function saveStreak(s) { localStorage.setItem('knight-streak', JSON.stringify(s)); }

  function loadJournal() {
    try {
      const raw = localStorage.getItem('knight-journal');
      if (!raw) return {};
      const data = JSON.parse(raw);
      if (data.date !== dayKey()) return {};
      return data;
    } catch { return {}; }
  }

  function saveJournalEntry(text) {
    const entries = JSON.parse(localStorage.getItem('knight-journal-history') || '[]');
    entries.push({ date: dayKey(), text, timestamp: new Date().toISOString() });
    localStorage.setItem('knight-journal-history', JSON.stringify(entries));
    localStorage.setItem('knight-journal', JSON.stringify({ date: dayKey(), text, saved: true }));
  }

  let state = loadState();
  let praisePicks = {};
  DUTIES.forEach(d => { praisePicks[d.key] = randomFrom(PRAISE_POOL); });

  function updateStreak() {
    const count = DUTIES.filter(d => state[d.key]).length;
    if (count < 4) return;
    const streak = loadStreak();
    const today = dayKey();
    if (streak.lastDate === today) return;
    const yesterday = new Date();
    yesterday.setDate(yesterday.getDate() - 1);
    const yesterdayKey = yesterday.toISOString().slice(0, 10);
    if (streak.lastDate === yesterdayKey) { streak.count += 1; }
    else if (streak.lastDate !== today) { streak.count = 1; }
    streak.lastDate = today;
    saveStreak(streak);
  }

  function renderDuties() {
    const grid = document.getElementById('dutiesGrid');
    grid.innerHTML = DUTIES.map(d => {
      const isChecked = state[d.key] ? ' checked' : '';
      const praise = praisePicks[d.key] || 'Duty honored.';
      return '<div class="duty-card' + isChecked + '" data-key="' + d.key + '" onclick="toggleDuty(\'' + d.key + '\', this)">' +
        '<div class="duty-card-top">' +
          '<div class="duty-checkbox"><span class="check-icon">✓</span></div>' +
          '<div class="duty-name">' + d.name + '</div>' +
        '</div>' +
        '<div class="duty-desc">' + d.desc + '</div>' +
        '<div class="duty-affirm">' + praise + '</div>' +
      '</div>';
    }).join('');
  }

  function toggleDuty(key, card) {
    state[key] = !state[key];
    saveState(state);
    if (state[key]) {
      praisePicks[key] = randomFrom(PRAISE_POOL);
      spawnSword(card);
    }
    updateStreak();
    renderAll();
  }

  function spawnSword(card) {
    const el = document.createElement('span');
    el.className = 'sword-float';
    el.textContent = '⚔️';
    el.style.left = (Math.random() * 60 + 20) + '%';
    el.style.bottom = '20%';
    card.appendChild(el);
    setTimeout(() => el.remove(), 1000);
  }

  function renderAvatar() {
    const count = DUTIES.filter(d => state[d.key]).length;
    const streak = loadStreak();
    const title = getTitle(streak.count);

    document.getElementById('avatarTitle').textContent = title.label;
    document.getElementById('avatarTitle').className = 'avatar-title' + (title.css ? ' ' + title.css : '');

    const wrap = document.getElementById('avatarWrap');
    wrap.classList.remove('aura-1', 'aura-2', 'aura-3', 'aura-4');
    if (count > 0) wrap.classList.add('aura-' + Math.min(count, 4));

    const crown = document.getElementById('avatarCrown');
    const cape = document.getElementById('avatarCape');
    const sword = document.getElementById('avatarSword');
    const armor = document.getElementById('avatarArmor');
    const pauldronL = document.getElementById('avatarPauldronL');
    const pauldronR = document.getElementById('avatarPauldronR');
    const sparkles = document.getElementById('avatarSparkles');
    const rewardText = document.getElementById('avatarRewardText');

    crown.classList.remove('show');
    cape.classList.remove('show');
    sword.classList.remove('show');
    armor.classList.remove('show');
    pauldronL.classList.remove('show');
    pauldronR.classList.remove('show');
    sparkles.classList.remove('show');
    rewardText.classList.remove('show', 'tier');

    if (count >= 1) crown.classList.add('show');
    if (count >= 2) cape.classList.add('show');
    if (count >= 3) sword.classList.add('show');

    if (count >= 4) {
      armor.classList.add('show');
      pauldronL.classList.add('show');
      pauldronR.classList.add('show');
      sparkles.classList.add('show');
      rewardText.textContent = randomFrom(FULL_PRAISE);
      rewardText.classList.add('show');
    } else if (count > 0) {
      rewardText.textContent = TIER_MESSAGES[count];
      rewardText.classList.add('show', 'tier');
    }
  }

  function renderProgress() {
    const count = DUTIES.filter(d => state[d.key]).length;
    const fill = document.getElementById('progressFill');
    const text = document.getElementById('progressText');
    fill.style.width = (count / 4 * 100) + '%';
    if (count === 4) {
      fill.classList.add('full');
      text.className = 'progress-text complete';
      text.textContent = '⚔️ Full dominion today.';
    } else {
      fill.classList.remove('full');
      text.className = 'progress-text';
      text.textContent = count + ' of 4 duties complete';
    }
  }

  function renderStreak() {
    const streak = loadStreak();
    const badge = document.getElementById('streakBadge');
    const text = document.getElementById('streakText');
    if (streak.count > 0) {
      badge.classList.add('show');
      text.textContent = 'Day ' + streak.count + ' streak';
    } else { badge.classList.remove('show'); }
  }

  function renderJournal() {
    const count = DUTIES.filter(d => state[d.key]).length;
    const section = document.getElementById('journalSection');
    const saved = loadJournal();
    if (count === 4) {
      section.classList.remove('hidden');
      document.getElementById('journalPrompt').textContent = randomFrom(JOURNAL_PROMPTS);
      if (saved.saved) {
        document.getElementById('journalInput').value = saved.text || '';
        document.getElementById('journalSaveBtn').textContent = 'Sealed ⚔️';
        document.getElementById('journalSaveBtn').classList.add('saved');
      }
    } else { section.classList.add('hidden'); }
  }

  function saveJournal() {
    const text = document.getElementById('journalInput').value.trim();
    if (!text) return;
    saveJournalEntry(text);
    const btn = document.getElementById('journalSaveBtn');
    btn.textContent = 'Sealed ⚔️';
    btn.classList.add('saved');
  }

  function renderAll() { renderDuties(); renderAvatar(); renderProgress(); renderStreak(); renderJournal(); }

  function showResetModal() { document.getElementById('resetModal').classList.add('open'); }
  function closeResetModal() { document.getElementById('resetModal').classList.remove('open'); }

  function confirmReset() {
    state = {};
    saveState(state);
    praisePicks = {};
    DUTIES.forEach(d => { praisePicks[d.key] = randomFrom(PRAISE_POOL); });
    renderAll();
    closeResetModal();
  }

  document.getElementById('resetModal').addEventListener('click', (e) => {
    if (e.target === e.currentTarget) closeResetModal();
  });

  renderAll();

  window.addEventListener('focus', () => {
    const fresh = loadState();
    if (Object.keys(fresh).length === 0 && Object.keys(state).length > 0) {
      state = fresh;
      renderAll();
    }
  });
</script>

</body>
</html>
